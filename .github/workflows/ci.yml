name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv lock --check
      - run: uv sync --locked --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run uv-secure
      - run: uv cache prune --ci
        if: always()
        continue-on-error: true

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --locked --dev
      - run: uv run ty check src tests
      - run: uv cache prune --ci
        if: always()
        continue-on-error: true

  docvet:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: Alberto-Codes/docvet@v1

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
        adk-version: ["1.20.0", ""]  # "" = use locked/latest
    name: test (${{ matrix.os }}, py${{ matrix.python-version }}, adk ${{ matrix.adk-version || 'latest' }})
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-suffix: ${{ matrix.os }}-py${{ matrix.python-version }}
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --locked --dev
        env:
          UV_PYTHON: ${{ matrix.python-version }}
      - name: Override ADK version (if pinned)
        if: matrix.adk-version != ''
        run: uv pip install google-adk==${{ matrix.adk-version }}
      - run: uv run pytest --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=85
        env:
          UV_PYTHON: ${{ matrix.python-version }}
      - uses: codecov/codecov-action@v6
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && matrix.adk-version == ''
        with:
          fail_ci_if_error: false
      - run: uv cache prune --ci
        if: always()
        continue-on-error: true
