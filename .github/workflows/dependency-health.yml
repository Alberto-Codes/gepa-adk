name: Dependency Health Check

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

jobs:
  check-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --locked --dev

      - name: Vulnerability scan
        run: uvx uv-secure

      - name: Check for outdated dependencies
        run: |
          echo "## Dependency Health Report" > deps-report.md
          echo "Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> deps-report.md
          echo "" >> deps-report.md
          echo "### Current Dependencies" >> deps-report.md
          echo '```' >> deps-report.md
          uv pip list >> deps-report.md || echo "Could not list dependencies" >> deps-report.md
          echo '```' >> deps-report.md

      - name: Check ADK version
        run: |
          echo "" >> deps-report.md
          echo "### Google ADK Version" >> deps-report.md
          echo '```' >> deps-report.md
          uv pip show google-adk | grep -E "Name|Version|Location" >> deps-report.md || echo "ADK not found" >> deps-report.md
          echo '```' >> deps-report.md

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-health-report
          path: deps-report.md
          retention-days: 30

      - run: uv cache prune --ci
        if: always()
        continue-on-error: true
