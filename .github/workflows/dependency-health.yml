name: Dependency Health Check

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:  # Manual trigger

jobs:
  check-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
        # uv is installed via Astral's official installer (no pip needed)

      - name: Add uv to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Sync dependencies
        run: uv sync

      - name: Check for outdated dependencies
        run: |
          # Note: uv pip list is a valid uv command that works with uv-managed projects
          # It lists packages installed in the environment, similar to pip list
          echo "## Dependency Health Report" > deps-report.md
          echo "Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> deps-report.md
          echo "" >> deps-report.md
          echo "### Current Dependencies" >> deps-report.md
          echo '```' >> deps-report.md
          uv pip list >> deps-report.md || echo "Could not list dependencies" >> deps-report.md
          echo '```' >> deps-report.md
          echo "" >> deps-report.md
          echo "### Outdated Dependencies" >> deps-report.md
          echo '```' >> deps-report.md
          # Check if uv supports the --outdated flag before using it
          if uv pip list --help 2>&1 | grep -q -- '--outdated'; then
            # uv supports the --outdated flag; run the check and capture its exit code
            if ! uv pip list --outdated >> deps-report.md 2>&1; then
              echo "Failed to check outdated dependencies (uv pip list --outdated exited with an error)." >> deps-report.md
            fi
          else
            echo "The installed uv version does not support 'uv pip list --outdated'; skipping outdated dependency check." >> deps-report.md
          fi
          echo '```' >> deps-report.md

      - name: Check ADK version
        run: |
          echo "" >> deps-report.md
          echo "### Google ADK Version" >> deps-report.md
          echo '```' >> deps-report.md
          uv pip show google-adk | grep -E "Name|Version|Location" >> deps-report.md || echo "ADK not found" >> deps-report.md
          echo '```' >> deps-report.md

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-health-report
          path: deps-report.md
          retention-days: 30

