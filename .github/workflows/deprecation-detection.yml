name: Deprecation Detection

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:  # Manual trigger

jobs:
  detect-deprecations:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to commit baseline updates
      issues: write    # Required to create issues for new deprecations
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add uv to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Sync dependencies
        run: uv sync

      - name: Run tests and capture deprecation warnings
        run: |
          # Run tests with deprecation warnings enabled
          # Capture only DeprecationWarning to avoid noise
          uv run pytest -n auto -W default::DeprecationWarning 2>&1 | tee test-output.log || true
          
          # Extract unique deprecation warnings into a file, deduplicated by message
          # Extract just the warning message (without file/line info) for proper deduplication
          # Check if grep finds any matches before piping to sed to avoid empty input issues
          if grep -qi "DeprecationWarning" test-output.log; then
            grep -i "DeprecationWarning" test-output.log \
              | sed -E 's/^.*[Dd]eprecationWarning/DeprecationWarning/' \
              | sort -u > deprecations-current.txt
          else
            # No deprecation warnings found in test output; ensure the file exists but is empty.
            : > deprecations-current.txt
          fi
          # If the file is empty (no deprecations), record a clear message
          if [ ! -s deprecations-current.txt ]; then
            echo "No deprecations found" > deprecations-current.txt
          fi
          
          # Count deprecations
          DEPRECATION_COUNT=$(grep -c "DeprecationWarning" test-output.log || echo "0")
          echo "Found $DEPRECATION_COUNT deprecation warnings"

      - name: Prepare previous baseline (if exists)
        run: |
          mkdir -p baseline
          # Check for baseline in repository (persistent storage)
          if [ -f .github/baselines/deprecations-baseline.txt ]; then
            echo "Using repository baseline from .github/baselines/deprecations-baseline.txt"
            cp .github/baselines/deprecations-baseline.txt baseline/deprecations-baseline.txt
          else
            echo "No repository baseline found at .github/baselines/deprecations-baseline.txt"
          fi

      - name: Compare with baseline
        id: compare
        run: |
          # Determine if there are any current deprecations at all
          if ! grep -q "DeprecationWarning" deprecations-current.txt 2>/dev/null || [ "$(cat deprecations-current.txt)" = "No deprecations found" ]; then
            echo "No current deprecations to compare."
            : > new-deprecations.txt
            NEW_COUNT=0
          else
            if [ -f baseline/deprecations-baseline.txt ] && grep -q "DeprecationWarning" baseline/deprecations-baseline.txt 2>/dev/null && [ "$(cat baseline/deprecations-baseline.txt)" != "No deprecations found" ]; then
              echo "Comparing with baseline..."
              
              # Find new deprecations (in current but not in baseline), normalizing whitespace
              comm -13 <(sed 's/^[[:space:]]*//;s/[[:space:]]*$//' baseline/deprecations-baseline.txt | sort) <(sed 's/^[[:space:]]*//;s/[[:space:]]*$//' deprecations-current.txt | sort) > new-deprecations.txt || : > new-deprecations.txt
            else
              echo "No valid baseline found (missing, empty, or placeholder only) - treating all current deprecations as new."
              cp deprecations-current.txt new-deprecations.txt
            fi
            
            # Count new deprecations
            NEW_COUNT=$(wc -l < new-deprecations.txt | tr -d ' ')
          fi

          echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT

          if [ "$NEW_COUNT" -gt 0 ]; then
            echo "⚠️ Found $NEW_COUNT new deprecation warnings!"
            echo "has_new=true" >> $GITHUB_OUTPUT
          else
            echo "✅ No new deprecations found"
            echo "has_new=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate deprecation report
        run: |
          echo "# Deprecation Detection Report" > deprecation-report.md
          echo "Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> deprecation-report.md
          echo "" >> deprecation-report.md
          echo "## Summary" >> deprecation-report.md
          echo "- Total deprecation warnings: $(grep -c "DeprecationWarning" test-output.log || echo "0")" >> deprecation-report.md
          echo "- New deprecations: ${{ steps.compare.outputs.new_count }}" >> deprecation-report.md
          echo "" >> deprecation-report.md
          
          if [ "${{ steps.compare.outputs.has_new }}" == "true" ]; then
            echo "## ⚠️ New Deprecation Warnings Detected" >> deprecation-report.md
            echo "" >> deprecation-report.md
            echo "The following deprecation warnings are new:" >> deprecation-report.md
            echo '```' >> deprecation-report.md
            cat new-deprecations.txt >> deprecation-report.md
            echo '```' >> deprecation-report.md
            echo "" >> deprecation-report.md
            echo "**Action Required:** Review new deprecations and create issues if needed." >> deprecation-report.md
          else
            echo "## ✅ No New Deprecations" >> deprecation-report.md
            echo "" >> deprecation-report.md
            echo "No new deprecation warnings detected since last run." >> deprecation-report.md
          fi
          
          echo "" >> deprecation-report.md
          echo "## All Current Deprecations" >> deprecation-report.md
          echo '```' >> deprecation-report.md
          cat deprecations-current.txt >> deprecation-report.md
          echo '```' >> deprecation-report.md

      - name: Create issue for new deprecations
        if: steps.compare.outputs.has_new == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const newDeprecations = fs.readFileSync('new-deprecations.txt', 'utf8');
            
            const title = `⚠️ New deprecation warnings detected: ${new Date().toISOString().split('T')[0]}`;
            const body = `## New Deprecation Warnings Detected
            
            Automated deprecation detection found new warnings in the test suite.
            
            ### New Deprecations
            
            \`\`\`
            ${newDeprecations}
            \`\`\`
            
            ### Action Required
            
            1. Review new deprecations in \`docs/warnings/DEPRECATION_INVENTORY.md\`
            2. Assess risk level (HIGH/MEDIUM/LOW)
            3. Create tracking issue if migration needed
            4. Update \`DEPRECATION_INVENTORY.md\` with new entries
            
            ### Related
            
            - See \`docs/warnings/DEPRECATION_DETECTION_STRATEGY.md\` for detection process
            - See \`docs/warnings/DEPRECATION_INVENTORY.md\` for current inventory
            
            ---
            
            *This issue was created automatically by the deprecation detection workflow.*
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['deprecation', 'automated', 'tech-debt']
            });

      - name: Update baseline in repository (if changed)
        id: update-baseline
        # Only update baseline if content has actually changed to avoid unnecessary commits
        run: |
          mkdir -p .github/baselines
          # Check if baseline file exists and if content differs
          if [ -f .github/baselines/deprecations-baseline.txt ]; then
            if diff -q deprecations-current.txt .github/baselines/deprecations-baseline.txt > /dev/null 2>&1; then
              echo "Baseline unchanged - no update needed"
              echo "baseline_changed=false" >> $GITHUB_OUTPUT
            else
              cp deprecations-current.txt .github/baselines/deprecations-baseline.txt
              echo "Baseline updated in .github/baselines/deprecations-baseline.txt"
              echo "baseline_changed=true" >> $GITHUB_OUTPUT
            fi
          else
            # First run - create baseline
            cp deprecations-current.txt .github/baselines/deprecations-baseline.txt
            echo "Baseline created in .github/baselines/deprecations-baseline.txt"
            echo "baseline_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit baseline update (if changed)
        # Note: This step requires write permissions to the repository
        # The workflow needs 'contents: write' permission to commit
        # If permissions are not granted, this step will fail gracefully
        if: steps.update-baseline.outputs.baseline_changed == 'true'
        run: |
          # Configure git identity for the commit
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Stage the updated baseline file
          git add .github/baselines/deprecations-baseline.txt

          # Run commit and push, capturing exit codes and stderr for diagnostics
          set +e
          git commit -m "chore: Update deprecation baseline [skip ci]" 2>commit_error.log
          COMMIT_EXIT=$?
          git push 2>push_error.log
          PUSH_EXIT=$?
          set -e

          if [ "$COMMIT_EXIT" -ne 0 ] || [ "$PUSH_EXIT" -ne 0 ]; then
            {
              echo "### Deprecation baseline commit/push failed"
              echo
              echo "- commit exit code: $COMMIT_EXIT"
              echo "- push exit code: $PUSH_EXIT"
              echo
              echo "Commit stderr (first 200 lines):"
              sed -n '1,200p' commit_error.log 2>/dev/null || echo "(no commit stderr output)"
              echo
              echo "Push stderr (first 200 lines):"
              sed -n '1,200p' push_error.log 2>/dev/null || echo "(no push stderr output)"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Baseline commit and push succeeded." >> "$GITHUB_STEP_SUMMARY"
          fi

          # Do not fail the workflow solely because baseline commit/push failed
          exit 0
        continue-on-error: true  # Don't fail if commit/push fails (permissions issue)

      - name: Upload deprecation report
        uses: actions/upload-artifact@v4
        with:
          name: deprecation-report
          path: deprecation-report.md
          retention-days: 30

      - name: Upload full test output
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.log
          retention-days: 7

