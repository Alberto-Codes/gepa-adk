name: Boundaries

on:
  push:
    branches: [develop, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  boundaries:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --locked --dev
      - run: bash scripts/check_boundaries.sh
        continue-on-error: true  # TODO: remove after Story 1B.4 fixes pre-existing violations
      - run: python scripts/check_protocol_coverage.py
        continue-on-error: true  # TODO: remove after Story 3.2 fills contract test gaps
      - run: uv cache prune --ci
        if: always()
        continue-on-error: true
