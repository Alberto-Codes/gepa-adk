name: "Copilot Setup Steps"

# Automatically run when this file changes for validation
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Job MUST be named `copilot-setup-steps` to be picked up by Copilot
  copilot-setup-steps:
    runs-on: ubuntu-latest
    
    # Minimum permissions needed
    permissions:
      contents: read  # Required to checkout code
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      
      - name: Install uv
        run: pip install uv
      
      - name: Sync dependencies with uv
        run: uv sync --dev
