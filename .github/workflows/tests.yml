name: Tests

on:
  push:
    branches: [develop, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv lock --check
      - run: uv sync --locked --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run uv-secure
      - run: uv cache prune --ci
        if: always()
        continue-on-error: true

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --locked --dev
      - run: uv run ty check src tests
      - run: uv cache prune --ci
        if: always()
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        adk-version: ["1.20.0", ""]  # "" = use locked/latest
      fail-fast: false
    name: test (adk ${{ matrix.adk-version || 'latest' }})
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --locked --dev
      - name: Override ADK version (if pinned)
        if: matrix.adk-version != ''
        run: uv pip install google-adk==${{ matrix.adk-version }}
      - run: uv run pytest --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=85
      - uses: codecov/codecov-action@v5
        if: matrix.adk-version == ''
        with:
          fail_ci_if_error: false
      - run: uv cache prune --ci
        if: always()
        continue-on-error: true
